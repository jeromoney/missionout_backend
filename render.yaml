services:
  - type: web
    name: missionout-backend
    env: python
    plan: free
    buildCommand: pip install uv && uv sync --frozen --no-dev
    startCommand: uv run uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: missionout-db
          property: connectionString
      - key: DEBUG
        value: "false"
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false

databases:
  - name: missionout-db
